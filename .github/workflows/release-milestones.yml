# Updates GitHub milestones across all release repos.
# Two modes:
#   - Stable releases: close the current milestone, create the next patch
#     milestone, and move open issues forward.
#   - First betas (e.g. v35.0.0beta1): create the new major milestone.
# Can be triggered manually with dry-run or automatically from the release
# pipeline (release.yml).
# An audit step runs after every update to verify consistency.
# Use audit_only to run just the audit without making changes.

name: Update milestones on release
run-name: "Milestones for ${{ inputs.tag }}"

on:
  # Called from release.yml as part of the release pipeline
  workflow_call:
    inputs:
      tag:
        required: true
        type: string
  # Allows manual triggering from the Actions tab
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g., v33.0.4 or v35.0.0beta1)'
        required: true
      dry_run:
        description: 'Dry run: log the close/create/move this tag would do, change nothing (audit is skipped)'
        required: false
        type: boolean
        default: false
      next_due:
        description: 'Due date of the next patch release, e.g. 34.0.1 (YYYY-MM-DD). Leave empty to skip.'
        required: false
        type: string
        default: ''
      upcoming_due:
        description: 'Due date of the second-to-next patch release, e.g. 34.0.2 (YYYY-MM-DD). Leave empty to skip.'
        required: false
        type: string
        default: ''
      audit_only:
        description: 'Audit only: skip the update, just report milestone inconsistencies (orphans, missing, no due date)'
        required: false
        type: boolean
        default: false

permissions:
  contents: read

# Prevent duplicate runs for the same tag (e.g. manual re-trigger while
# the pipeline-invoked run is still in progress)
concurrency:
  group: release-milestones-${{ inputs.tag || github.ref_name }}
  cancel-in-progress: false

jobs:
  milestones:
    timeout-minutes: 30
    runs-on: ubuntu-latest

    env:
      RELEASE_TAG: ${{ inputs.tag || github.ref_name }}

    steps:
      - name: Check actor permission
        uses: skjnldsv/check-actor-permission@69e92a3c4711150929bca9fcf34448c5bf5526e7 # v3.0
        with:
          require: write

      - name: Checkout config
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Set up PHP
        uses: shivammathur/setup-php@7c071dfe9dc99bdf297fa79cb49ea005b9fcadbc # v2.37.1
        with:
          php-version: '8.3'
          tools: composer

      - name: Install release-tools
        run: composer install --no-interaction --no-progress --no-dev
        working-directory: tools/release

      # Alpha/beta releases use master.json (they branch from master).
      # Stable releases use stableXX.json matching their major version.
      - name: Determine config file
        id: config
        run: |
          TAG="${{ env.RELEASE_TAG }}"
          MAJOR=$(echo "$TAG" | sed 's/^v//' | cut -d. -f1)

          if [[ "$TAG" =~ \.0\.0(alpha|beta) ]]; then
            CONFIG="master.json"
          else
            CONFIG="stable${MAJOR}.json"
          fi

          if [[ ! -f "$CONFIG" ]]; then
            echo "::error::Config file $CONFIG not found"
            exit 1
          fi

          echo "config=$CONFIG" >> "$GITHUB_OUTPUT"

      - name: Update milestones
        if: inputs.audit_only != true
        env:
          # RELEASE_TOKEN is needed to manage milestones across org repos;
          # GITHUB_TOKEN is scoped to this repo only and used as fallback.
          GH_TOKEN: ${{ secrets.RELEASE_TOKEN || secrets.GITHUB_TOKEN }}
        run: |
          # Due dates come from release-schedule.json; a stable release with no
          # entry there fails (unless overridden via the inputs below).
          ARGS=("${{ env.RELEASE_TAG }}" "${{ steps.config.outputs.config }}" "tag-only.json" "--schedule" "release-schedule.json")
          if [[ "${{ inputs.dry_run }}" == "true" ]]; then
            ARGS+=("--dry-run")
          fi
          if [[ -n "${{ inputs.next_due }}" ]]; then
            ARGS+=("--next-due" "${{ inputs.next_due }}")
          fi
          if [[ -n "${{ inputs.upcoming_due }}" ]]; then
            ARGS+=("--upcoming-due" "${{ inputs.upcoming_due }}")
          fi
          php tools/release/bin/console milestones:update "${ARGS[@]}"

      # Audit runs after every update (and on audit_only) to verify
      # milestone consistency: orphans, missing milestones, naming issues.
      # Non-blocking on dry-run to avoid failing the pipeline on pre-existing issues.
      - name: Audit milestones
        if: inputs.dry_run != true
        env:
          GH_TOKEN: ${{ secrets.RELEASE_TOKEN || secrets.GITHUB_TOKEN }}
        run: |
          php tools/release/bin/console milestones:audit \
            "${{ steps.config.outputs.config }}" \
            "tag-only.json" || true
