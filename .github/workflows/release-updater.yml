name: Update updater server
run-name: "Updater PR ${{ inputs.tag }}"

on:
  workflow_call:
    inputs:
      tag:
        required: true
        type: string
      deploy:
        required: false
        type: number
        default: 0
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g., v34.0.1)'
        required: true
      deploy:
        description: 'Deploy percentage (auto: .0.0=30%, .0.1=70%, else 100%. Set 0 for auto)'
        type: number
        default: 0
      dry_run:
        description: 'Dry run (show diff, no PR)'
        type: boolean
        default: false

permissions:
  contents: read

concurrency:
  group: release-updater-${{ inputs.tag || github.ref_name }}
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Check actor permission
        uses: skjnldsv/check-actor-permission@69e92a3c4711150929bca9fcf34448c5bf5526e7 # v3.0
        with:
          require: write

      - name: Checkout scripts
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Set up PHP
        uses: shivammathur/setup-php@f3e473d116dcccaddc5834248c87452386958240 # v2.37.2
        with:
          php-version: '8.3'
          tools: composer

      - name: Install release-tools
        run: composer install --no-interaction --no-progress --no-dev
        working-directory: tools/release

      - name: Parse version
        id: parse
        run: |
          TAG="${{ inputs.tag }}"
          VERSION=$(echo "$TAG" | sed 's/^v//')
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Download signatures from release
        id: sigs
        env:
          GH_TOKEN: ${{ secrets.RELEASE_TOKEN || github.token }}
        run: |
          TAG="${{ inputs.tag }}"
          VERSION="${{ steps.parse.outputs.version }}"
          mkdir -p /tmp/release

          # Download .sig files attached to the GitHub release
          for ext in tar.bz2 zip; do
            sigfile="nextcloud-${VERSION}.${ext}.sig"
            if gh release download "$TAG" \
              --repo "${{ github.repository }}" \
              --pattern "$sigfile" \
              --dir /tmp/release 2>/dev/null; then
              echo "::notice::Downloaded ${sigfile} from release"
            else
              echo "::error::Signature file ${sigfile} not found on release ${TAG}"
              echo "::error::Run the build workflow first, or attach .sig files manually"
              exit 1
            fi
          done

          BZ2_SIG=$(cat "/tmp/release/nextcloud-${VERSION}.tar.bz2.sig")
          ZIP_SIG=$(cat "/tmp/release/nextcloud-${VERSION}.zip.sig")
          echo "bz2=${BZ2_SIG}" >> "$GITHUB_OUTPUT"
          echo "zip=${ZIP_SIG}" >> "$GITHUB_OUTPUT"
          echo "::notice::bz2 sig length: ${#BZ2_SIG}, zip sig length: ${#ZIP_SIG}"

      - name: Update updater server
        env:
          GH_TOKEN: ${{ secrets.RELEASE_TOKEN || github.token }}
        run: |
          set -uo pipefail
          TAG="${{ inputs.tag }}"
          VERSION="${{ steps.parse.outputs.version }}"
          MAJOR=$(echo "$VERSION" | cut -d. -f1)

          # version.php / versioncheck.php come from the tag, or its branch as fallback.
          if [[ "$TAG" =~ \.0\.0(alpha|beta) ]]; then BRANCH="master"; else BRANCH="stable${MAJOR}"; fi
          fetch() {
            curl -sf "https://raw.githubusercontent.com/nextcloud/server/refs/tags/${TAG}/$1" \
              || curl -sf "https://raw.githubusercontent.com/nextcloud/server/refs/heads/${BRANCH}/$1" || true
          }

          # Internal version: $OC_Version = [x, y, z, n]
          # shellcheck disable=SC2016
          INTERNAL=$(fetch version.php | grep -oP '\$OC_Version\s*=\s*\[\K[0-9, ]+' | tr -d ' ' | tr ',' '.')
          [ -n "$INTERNAL" ] || { echo "::error::could not parse OC_Version from version.php"; exit 1; }

          # Minimum PHP from versioncheck.php (default 8.1)
          MIN_ID=$(fetch lib/versioncheck.php | grep -oP 'PHP_VERSION_ID < \K\d+' | head -1)
          if [ -n "$MIN_ID" ]; then MIN_PHP="8.$(( (MIN_ID / 100) % 100 ))"; else MIN_PHP="8.1"; fi
          echo "::notice::internal=${INTERNAL} minPHP=${MIN_PHP}"

          WORK=$(mktemp -d)
          gh repo clone nextcloud-releases/updater_server "$WORK" -- --depth=1

          ARGS=("$TAG" "$WORK"
            --bz2-sig "${{ steps.sigs.outputs.bz2 }}"
            --zip-sig "${{ steps.sigs.outputs.zip }}"
            --internal-version "$INTERNAL"
            --min-php "$MIN_PHP")
          DEPLOY="${{ inputs.deploy }}"
          if [ "$DEPLOY" != "0" ] && [ -n "$DEPLOY" ]; then ARGS+=(--deploy "$DEPLOY"); fi
          php tools/release/bin/console updater:bump "${ARGS[@]}"

          # config.php is regenerated by the updater server's own builder.
          ( cd "$WORK" && make config/config.php )
          echo "=== diff ==="; ( cd "$WORK" && git --no-pager diff --stat )

          if [ "${{ inputs.dry_run || 'false' }}" = "true" ]; then
            echo "::notice::dry run - no PR"
            ( cd "$WORK" && git --no-pager diff )
            exit 0
          fi

          cd "$WORK"
          if [ -z "$(git config user.email)" ]; then
            LOGIN=$(gh api user --jq .login 2>/dev/null || true)
            if [ -n "$LOGIN" ]; then
              ID=$(gh api user --jq .id)
              git config user.name "$LOGIN"
              git config user.email "${ID}+${LOGIN}@users.noreply.github.com"
            else
              git config user.name "github-actions[bot]"
              git config user.email "github-actions[bot]@users.noreply.github.com"
            fi
          fi
          BR="releases/${VERSION}"
          git checkout -b "$BR"
          git add config/ tests/
          git commit --signoff -m "chore: add ${VERSION} to the updater server"
          gh auth setup-git
          git push --force -u origin "$BR"
          gh pr create --repo nextcloud-releases/updater_server --base master --head "$BR" \
            --title "chore: add ${VERSION} to the updater server" \
            --body "Automated PR from the release pipeline for ${TAG} (internal ${INTERNAL}, minPHP ${MIN_PHP})."

      - name: Write step summary
        if: always()
        run: |
          VERSION="${{ steps.parse.outputs.version }}"
          DEPLOY="${{ inputs.deploy }}"
          DRY="${{ inputs.dry_run || 'false' }}"
          {
            echo "## Updater Server Update: ${{ inputs.tag }}"
            echo ""
            echo "| | |"
            echo "|---|---|"
            echo "| Version | ${VERSION} |"
            echo "| Deploy | ${DEPLOY}% (0 = auto) |"
            echo "| Dry run | ${DRY} |"
          } >> "$GITHUB_STEP_SUMMARY"
