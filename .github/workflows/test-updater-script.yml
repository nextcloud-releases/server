name: Test updater script

on:
  pull_request:
    paths:
      - '.github/scripts/update-updater-server.sh'
      - '.github/scripts/test-updater-script.sh'
      - 'tests/updater-script/**'

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Set up PHP
        uses: shivammathur/setup-php@7c071dfe9dc99bdf297fa79cb49ea005b9fcadbc # v2.37.1
        with:
          php-version: '8.2'
          tools: none

      - name: Shellcheck
        run: shellcheck .github/scripts/*.sh

      - name: Run snapshot tests
        run: bash .github/scripts/test-updater-script.sh
