name: Test release tools (PHP)

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        suite: [domain, milestones-update, milestones-audit, tagger, updater]
    name: test (${{ matrix.suite }})
    defaults:
      run:
        working-directory: tools/release

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Set up PHP
        uses: shivammathur/setup-php@f3e473d116dcccaddc5834248c87452386958240 # v2.37.2
        with:
          php-version: '8.3'
          coverage: pcov
          tools: composer

      - name: Install dependencies
        run: composer install --no-interaction --no-progress

      - name: PHPUnit (${{ matrix.suite }})
        run: vendor/bin/phpunit --testsuite ${{ matrix.suite }} --coverage-text --coverage-clover coverage.xml

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7.0.0
        with:
          files: tools/release/coverage.xml
          flags: ${{ matrix.suite }}
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false
