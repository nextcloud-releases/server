name: Tag all repositories
run-name: "Tag ${{ inputs.tag }}"

on:
  workflow_call:
    inputs:
      tag:
        required: true
        type: string
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to create (e.g., v34.0.1)'
        required: true
      force:
        description: 'Delete and recreate existing tags'
        required: false
        type: boolean
        default: false
      dry_run:
        description: 'Preview tagging without creating tags'
        required: false
        type: boolean
        default: false

permissions:
  contents: read

concurrency:
  group: release-tag-${{ inputs.tag || github.ref_name }}
  cancel-in-progress: false

jobs:
  tag:
    timeout-minutes: 15
    runs-on: ubuntu-latest

    env:
      RELEASE_TAG: ${{ inputs.tag || github.ref_name }}

    steps:
      - name: Check actor permission
        uses: skjnldsv/check-actor-permission@69e92a3c4711150929bca9fcf34448c5bf5526e7 # v3.0
        with:
          require: write

      - name: Checkout config
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Set up PHP
        uses: shivammathur/setup-php@7c071dfe9dc99bdf297fa79cb49ea005b9fcadbc # v2.37.1
        with:
          php-version: '8.3'
          tools: composer

      - name: Install release-tools
        run: composer install --no-interaction --no-progress --no-dev
        working-directory: tools/release

      - name: Determine branch and config
        id: config
        run: |
          TAG="${{ env.RELEASE_TAG }}"
          echo "Tag: $TAG"

          # Validate tag format
          if [[ ! "$TAG" =~ ^v[1-9][0-9]*\.[0-9]+\.[0-9]+(alpha|beta|rc)?[0-9]*$ ]]; then
            echo "::error::Invalid tag format: $TAG (expected vXX.Y.Z[alphaN|betaN|rcN])"
            exit 1
          fi

          # Extract major version and determine branch
          MAJOR=$(echo "$TAG" | sed 's/^v//' | cut -d. -f1)
          if [[ "$TAG" =~ \.0\.0(alpha|beta) ]]; then
            BRANCH="master"
          else
            BRANCH="stable${MAJOR}"
          fi

          # Find config file
          if [ "$BRANCH" = "master" ]; then
            CONFIG="master.json"
          else
            CONFIG="stable${MAJOR}.json"
          fi

          if [ ! -f "$CONFIG" ]; then
            echo "::error::Config file $CONFIG not found. Create it for NC${MAJOR}."
            exit 1
          fi

          echo "branch=$BRANCH" >> "$GITHUB_OUTPUT"
          echo "config=$CONFIG" >> "$GITHUB_OUTPUT"
          echo "::notice::Tagging repos from $CONFIG + tag-only.json at $BRANCH HEAD -> $TAG"

      - name: Tag all repositories
        env:
          GH_TOKEN: ${{ secrets.RELEASE_TOKEN || secrets.GITHUB_TOKEN }}
        run: |
          ARGS=(
            "${{ env.RELEASE_TAG }}"
            "${{ steps.config.outputs.branch }}"
            "${{ steps.config.outputs.config }}"
            "tag-only.json"
          )
          if [ "${{ inputs.force }}" = "true" ]; then
            ARGS+=("--force")
          fi
          if [ "${{ inputs.dry_run }}" = "true" ]; then
            ARGS+=("--dry-run")
          fi
          php tools/release/bin/console repo:tag "${ARGS[@]}"
