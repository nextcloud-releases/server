name: Tag all repositories
run-name: "Tag ${{ inputs.tag }}"

on:
  workflow_call:
    inputs:
      tag:
        required: true
        type: string
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to create (e.g., v34.0.1)'
        required: true
      force:
        description: 'Delete and recreate existing tags'
        required: false
        type: boolean
        default: false

permissions:
  contents: read

concurrency:
  group: release-tag-${{ inputs.tag || github.ref_name }}
  cancel-in-progress: false

jobs:
  tag:
    timeout-minutes: 15
    runs-on: ubuntu-latest

    env:
      RELEASE_TAG: ${{ inputs.tag || github.ref_name }}

    steps:
      - name: Check actor permission
        uses: skjnldsv/check-actor-permission@69e92a3c4711150929bca9fcf34448c5bf5526e7 # v3.0
        with:
          require: write

      - name: Checkout config
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Determine branch and config
        id: config
        run: |
          TAG="${{ env.RELEASE_TAG }}"
          echo "Tag: $TAG"

          # Validate tag format
          if [[ ! "$TAG" =~ ^v[1-9][0-9]*\.[0-9]+\.[0-9]+(alpha|beta|rc)?[0-9]*$ ]]; then
            echo "::error::Invalid tag format: $TAG (expected vXX.Y.Z[alphaN|betaN|rcN])"
            exit 1
          fi

          # Extract major version and determine branch
          MAJOR=$(echo "$TAG" | sed 's/^v//' | cut -d. -f1)
          if [[ "$TAG" =~ \.0\.0(alpha|beta) ]]; then
            BRANCH="master"
          else
            BRANCH="stable${MAJOR}"
          fi

          # Find config file
          if [ "$BRANCH" = "master" ]; then
            CONFIG="master.json"
          else
            CONFIG="stable${MAJOR}.json"
          fi

          if [ ! -f "$CONFIG" ]; then
            echo "::error::Config file $CONFIG not found. Create it for NC${MAJOR}."
            exit 1
          fi

          echo "branch=$BRANCH" >> "$GITHUB_OUTPUT"
          echo "config=$CONFIG" >> "$GITHUB_OUTPUT"
          echo "::notice::Tagging repos from $CONFIG + tag-only.json at $BRANCH HEAD → $TAG"

      - name: Tag all repositories
        env:
          GH_TOKEN: ${{ secrets.RELEASE_TOKEN || secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ env.RELEASE_TAG }}"
          BRANCH="${{ steps.config.outputs.branch }}"
          CONFIG="${{ steps.config.outputs.config }}"
          FORCE_FLAG=""
          if [ "${{ inputs.force }}" = "true" ]; then
            FORCE_FLAG="--force"
          fi

          # Merge app repos from build config + non-build repos from tag-only.json
          REPOS=$(jq -r '.[].repo' "$CONFIG")
          if [ -f "tag-only.json" ]; then
            REPOS=$(echo "$REPOS"; jq -r '.[]' "tag-only.json")
          fi
          REPOS=$(echo "$REPOS" | sort -u)

          SUCCESS=0
          SKIPPED=0
          FAILED=0

          {
            echo "## Tag results: $TAG"
            echo ""
            echo "| Repository | Branch | Status |"
            echo "|---|---|---|"
          } >> "$GITHUB_STEP_SUMMARY"

          while read -r repo; do
            [ -z "$repo" ] && continue

            # Resolve branch: try stable branch, fall back to repo default
            REPO_BRANCH="$BRANCH"
            if ! gh api "repos/$repo/git/ref/heads/$REPO_BRANCH" &>/dev/null; then
              REPO_BRANCH=$(gh api "repos/$repo" --jq '.default_branch' 2>/dev/null) || REPO_BRANCH=""
            fi

            if [ -z "$REPO_BRANCH" ]; then
              echo "$repo: no branch found"
              echo "| \`$repo\` | - | no branch found |" >> "$GITHUB_STEP_SUMMARY"
              FAILED=$((FAILED + 1))
              continue
            fi

            echo -n "$repo@$REPO_BRANCH → $TAG ... "
            RESULT=$(bash .github/scripts/tag-repo.sh "$repo" "$REPO_BRANCH" "$TAG" $FORCE_FLAG)
            echo "$RESULT"

            case "$RESULT" in
              OK*)
                echo "| \`$repo\` | $REPO_BRANCH | tagged |" >> "$GITHUB_STEP_SUMMARY"
                SUCCESS=$((SUCCESS + 1))
                ;;
              SKIPPED*)
                echo "| \`$repo\` | $REPO_BRANCH | already tagged |" >> "$GITHUB_STEP_SUMMARY"
                SKIPPED=$((SKIPPED + 1))
                ;;
              *)
                echo "| \`$repo\` | $REPO_BRANCH | **failed** |" >> "$GITHUB_STEP_SUMMARY"
                FAILED=$((FAILED + 1))
                ;;
            esac
          done <<< "$REPOS"

          {
            echo ""
            echo "**Tagged: $SUCCESS | Skipped: $SKIPPED | Failed: $FAILED**"
          } >> "$GITHUB_STEP_SUMMARY"

          if [ "$FAILED" -gt 0 ]; then
            echo "::error::$FAILED repos failed to tag"
            exit 1
          fi
