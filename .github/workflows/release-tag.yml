name: Tag all repositories
run-name: "Tag ${{ inputs.tag }}"

on:
  workflow_call:
    inputs:
      tag:
        required: true
        type: string
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to create (e.g., v34.0.1)'
        required: true
      force:
        description: 'Delete and recreate existing tags'
        required: false
        type: boolean
        default: false

permissions:
  contents: read

concurrency:
  group: release-tag-${{ inputs.tag || github.ref_name }}
  cancel-in-progress: false

jobs:
  tag:
    timeout-minutes: 15
    runs-on: ubuntu-latest

    env:
      RELEASE_TAG: ${{ inputs.tag || github.ref_name }}

    steps:
      - name: Check actor permission
        uses: skjnldsv/check-actor-permission@69e92a3c4711150929bca9fcf34448c5bf5526e7 # v3.0
        with:
          require: write

      - name: Checkout config
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Determine branch and config
        id: config
        run: |
          TAG="${{ env.RELEASE_TAG }}"
          echo "Tag: $TAG"

          # Validate tag format
          if [[ ! "$TAG" =~ ^v[1-9][0-9]*\.[0-9]+\.[0-9]+(alpha|beta|rc)?[0-9]*$ ]]; then
            echo "::error::Invalid tag format: $TAG (expected vXX.Y.Z[alphaN|betaN|rcN])"
            exit 1
          fi

          # Extract major version and determine branch
          MAJOR=$(echo "$TAG" | sed 's/^v//' | cut -d. -f1)
          if [[ "$TAG" =~ \.0\.0(alpha|beta) ]]; then
            BRANCH="master"
          else
            BRANCH="stable${MAJOR}"
          fi

          # Find config file
          if [ "$BRANCH" = "master" ]; then
            CONFIG=$(ls stable*.json 2>/dev/null | sort -V | tail -1)
          else
            CONFIG="stable${MAJOR}.json"
          fi

          if [ ! -f "$CONFIG" ]; then
            echo "::error::Config file $CONFIG not found. Create it for NC${MAJOR}."
            exit 1
          fi

          echo "branch=$BRANCH" >> "$GITHUB_OUTPUT"
          echo "config=$CONFIG" >> "$GITHUB_OUTPUT"
          echo "::notice::Tagging repos from $CONFIG + tag-only.json at $BRANCH HEAD → $TAG"

      - name: Tag all repositories
        env:
          GH_TOKEN: ${{ secrets.RELEASE_TOKEN || secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ env.RELEASE_TAG }}"
          BRANCH="${{ steps.config.outputs.branch }}"
          CONFIG="${{ steps.config.outputs.config }}"

          # Merge app repos from build config + non-build repos from tag-only.json
          # (server, 3rdparty, updater, example-files, documentation)
          REPOS=$(jq -r '.[].repo' "$CONFIG")
          if [ -f "tag-only.json" ]; then
            REPOS=$(echo "$REPOS"; jq -r '.[]' "tag-only.json")
          fi
          REPOS=$(echo "$REPOS" | sort -u)

          TOTAL=0
          SUCCESS=0
          SKIPPED=0
          FAILED=0

          {
            echo "## Tag results: $TAG"
            echo ""
            echo "| Repository | Branch | Status | Commit |"
            echo "|---|---|---|---|"
          } >> "$GITHUB_STEP_SUMMARY"

          echo "$REPOS" | while read -r repo; do
            [ -z "$repo" ] && continue
            TOTAL=$((TOTAL + 1))

            # Try stable branch first. If it doesn't exist (e.g. some repos
            # use "main" instead of "master"), fall back to the repo's default branch.
            REPO_BRANCH="$BRANCH"
            SHA=$(gh api "repos/$repo/git/ref/heads/$REPO_BRANCH" --jq '.object.sha' 2>/dev/null)
            if [ -z "$SHA" ]; then
              REPO_BRANCH=$(gh api "repos/$repo" --jq '.default_branch' 2>/dev/null)
              SHA=$(gh api "repos/$repo/git/ref/heads/$REPO_BRANCH" --jq '.object.sha' 2>/dev/null)
            fi
            echo -n "$repo@$REPO_BRANCH → $TAG ... "

            if [ -z "$SHA" ]; then
              echo "SKIP (no branch found)"
              echo "| \`$repo\` | - | no branch found | - |" >> "$GITHUB_STEP_SUMMARY"
              FAILED=$((FAILED + 1))
              continue
            fi

            # Check if tag already exists
            EXISTING=$(gh api "repos/$repo/git/ref/tags/$TAG" --jq '.object.sha' 2>/dev/null)
            if [ -n "$EXISTING" ]; then
              if [ "${{ inputs.force }}" = "true" ]; then
                echo -n "FORCE replacing ${EXISTING:0:8} ... "
                gh release delete "$TAG" --repo "$repo" --yes 2>/dev/null || true
                gh api -X DELETE "repos/$repo/git/refs/tags/$TAG" 2>/dev/null || true
              else
                echo "EXISTS (${EXISTING:0:8})"
                echo "| \`$repo\` | $REPO_BRANCH | already tagged | \`${EXISTING:0:8}\` |" >> "$GITHUB_STEP_SUMMARY"
                SKIPPED=$((SKIPPED + 1))
                continue
              fi
            fi

            # Create tag via temporary release. gh release create makes a tag
            # on the target branch. We then delete the release but the tag stays.
            # This avoids needing git clone + SSH keys for each repo.
            if gh release create "$TAG" \
              --repo "$repo" \
              --target "$REPO_BRANCH" \
              --title "$TAG" \
              --notes "" \
              > /dev/null 2>&1; then
              # Delete the release, keep the tag
              gh release delete "$TAG" --repo "$repo" --yes 2>/dev/null || true
              echo "OK (${SHA:0:8})"
              echo "| \`$repo\` | $REPO_BRANCH | tagged | \`${SHA:0:8}\` |" >> "$GITHUB_STEP_SUMMARY"
              SUCCESS=$((SUCCESS + 1))
            else
              echo "FAILED"
              echo "| \`$repo\` | $REPO_BRANCH | **failed** | - |" >> "$GITHUB_STEP_SUMMARY"
              FAILED=$((FAILED + 1))
            fi
          done

          {
            echo ""
            echo "**Tagged: $SUCCESS | Skipped: $SKIPPED | Failed: $FAILED**"
          } >> "$GITHUB_STEP_SUMMARY"

          if [ "$FAILED" -gt 0 ]; then
            echo "::error::$FAILED repos failed to tag"
            exit 1
          fi
