name: Build and compare release
run-name: "Build ${{ inputs.tag }}"

on:
  workflow_call:
    inputs:
      tag:
        required: true
        type: string
  workflow_dispatch:
    inputs:
      tag:
        description: 'Existing release tag to build and compare (e.g., v34.0.1)'
        required: true

permissions:
  contents: read

concurrency:
  group: release-build-${{ inputs.tag || github.ref_name }}
  cancel-in-progress: false

env:
  COMPOSER_ALLOW_SUPERUSER: '1'

jobs:
  init:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.generate.outputs.matrix }}
      branch: ${{ steps.parse.outputs.branch }}
      channel: ${{ steps.parse.outputs.channel }}
      major: ${{ steps.parse.outputs.major }}
      version: ${{ steps.parse.outputs.version }}
      tag: ${{ steps.parse.outputs.tag }}
      php_version: ${{ steps.php.outputs.version }}
      ref: ${{ steps.ref.outputs.ref }}

    steps:
      - name: Check actor permission
        uses: skjnldsv/check-actor-permission@69e92a3c4711150929bca9fcf34448c5bf5526e7 # v3.0
        with:
          require: write

      - name: Checkout config
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Parse version
        id: parse
        run: |
          TAG="${{ inputs.tag || github.ref_name }}"
          VERSION=$(echo "$TAG" | sed 's/^v//')
          MAJOR=$(echo "$VERSION" | cut -d. -f1)

          # Alpha/beta builds come from master, everything else from stable branches
          # RCs use the stable branch with the stable channel
          if [[ "$VERSION" =~ \.0\.0(alpha|beta) ]]; then
            BRANCH="master"
            CHANNEL="beta"
          else
            BRANCH="stable${MAJOR}"
            CHANNEL="stable"
          fi

          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "major=$MAJOR" >> "$GITHUB_OUTPUT"
          echo "branch=$BRANCH" >> "$GITHUB_OUTPUT"
          echo "channel=$CHANNEL" >> "$GITHUB_OUTPUT"

          echo "::notice::Building NC${MAJOR} v${VERSION} from ${BRANCH} (channel: ${CHANNEL})"

      - name: Determine ref and verify version.php
        id: ref
        run: |
          TAG="${{ steps.parse.outputs.tag }}"
          VERSION="${{ steps.parse.outputs.version }}"
          BRANCH="${{ steps.parse.outputs.branch }}"

          # If the tag exists on the server repo, use it (exact commit).
          # Otherwise use the branch HEAD (new release, tag not created yet).
          TAG_EXISTS=$(curl -sf "https://raw.githubusercontent.com/nextcloud/server/refs/tags/${TAG}/version.php" \
            | grep 'OC_VersionString' | cut -d"'" -f2)

          if [ -n "$TAG_EXISTS" ]; then
            REF="$TAG"
            VERSION_STRING="$TAG_EXISTS"
            echo "::notice::Using tag ${TAG} (exact release commit)"
          else
            REF="$BRANCH"
            VERSION_STRING=$(curl -sf "https://raw.githubusercontent.com/nextcloud/server/refs/heads/${BRANCH}/version.php" \
              | grep 'OC_VersionString' | cut -d"'" -f2)
            echo "::notice::Tag not found, using branch ${BRANCH} HEAD"
          fi

          if [ -z "$VERSION_STRING" ]; then
            echo "::error::Could not read version.php from nextcloud/server@${REF}"
            exit 1
          fi

          # Normalize both for comparison.
          # version.php may say "34.0.0 RC3" or "34.0.0" — strip suffix + spaces, lowercase.
          # Input version may be "34.0.0rc3" — strip suffix.
          CLEAN_VERSION=$(echo "$VERSION" | sed 's/[[:space:]]*\(rc\|beta\|alpha\)[0-9]*$//i')
          CLEAN_VSTRING=$(echo "$VERSION_STRING" | sed 's/[[:space:]]*\(RC\|rc\|beta\|alpha\)[0-9]*$//i')

          if [[ "$CLEAN_VSTRING" != "$CLEAN_VERSION" ]]; then
            echo "::error::version.php says ${VERSION_STRING} but releasing ${VERSION}. Is the bump PR merged?"
            exit 1
          fi

          # For master builds, empty ref = use repo's default branch
          if [ "$REF" = "master" ]; then
            REF=""
          fi

          echo "ref=$REF" >> "$GITHUB_OUTPUT"
          echo "::notice::version.php confirms ${VERSION_STRING}"

      - name: Detect PHP version from server
        id: php
        run: |
          BRANCH="${{ steps.parse.outputs.branch }}"
          # Use the minimum supported PHP version from versioncheck.php.
          # This matches the release script, which tries php8.4→down and picks
          # the first that passes occ status (i.e. the lowest available that
          # satisfies the minimum). Using the minimum ensures composer generates
          # identical autoloader output (platform_check.php, etc.).
          MIN_PHP_ID=$(curl -sf "https://raw.githubusercontent.com/nextcloud/server/refs/heads/${BRANCH}/lib/versioncheck.php" \
            | grep -oP 'PHP_VERSION_ID < \K\d+' | head -1)

          if [ -n "$MIN_PHP_ID" ]; then
            # 80200 → major=8, minor=2 → PHP 8.2
            MIN_MINOR=$(( (MIN_PHP_ID / 100) % 100 ))
            PHP_VERSION="8.${MIN_MINOR}"
          else
            PHP_VERSION="8.1"
          fi

          echo "version=$PHP_VERSION" >> "$GITHUB_OUTPUT"
          echo "::notice::Using PHP ${PHP_VERSION} for build"

      - name: Generate app matrix
        id: generate
        run: |
          BRANCH="${{ steps.parse.outputs.branch }}"
          MAJOR="${{ steps.parse.outputs.major }}"

          if [ "$BRANCH" = "master" ]; then
            CONFIG="master.json"
          else
            CONFIG="stable${MAJOR}.json"
          fi

          if [ ! -f "$CONFIG" ]; then
            echo "::error::Config file $CONFIG not found. Create it for NC${MAJOR} releases."
            exit 1
          fi

          # Use the resolved ref from the version check step.
          # For tags: "v32.0.8". For branches: "stable34" or "" (master).
          REF="${{ steps.ref.outputs.ref }}"

          MATRIX=$(jq -c --arg ref "$REF" \
            'map(. + {branch: $ref}) | {include: .}' "$CONFIG")

          echo "matrix=$MATRIX" >> "$GITHUB_OUTPUT"
          echo "Generated matrix with $(echo "$MATRIX" | jq '.include | length') apps"

  fetch-server:
    needs: init
    runs-on: ubuntu-latest
    steps:
      - name: Checkout server
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          repository: nextcloud/server
          ref: ${{ needs.init.outputs.ref }}

      - name: Save commit hash
        run: git rev-parse HEAD > release-commit-hash

      - name: Checkout scripts
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          path: _scripts
          sparse-checkout: .github/scripts

      - name: Clean dev files
        run: bash _scripts/.github/scripts/clean-server-dev-files.sh && rm -rf _scripts

      - name: Upload
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: server
          path: .
          include-hidden-files: true
          retention-days: 1

  fetch-3rdparty:
    needs: init
    runs-on: ubuntu-latest
    steps:
      - name: Checkout 3rdparty
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          repository: nextcloud/3rdparty
          ref: ${{ needs.init.outputs.ref }}

      - name: Clean
        run: rm -rf .git .github .gitignore README.md

      - name: Upload
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: 3rdparty
          path: .
          include-hidden-files: true
          retention-days: 1

  fetch-apps:
    needs: init
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.init.outputs.matrix) }}

    steps:
      - name: Checkout ${{ matrix.id }}
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          repository: ${{ matrix.repo }}
          ref: ${{ matrix.branch }}
          token: ${{ secrets.RELEASE_TOKEN || github.token }}

      - name: Check composer
        id: check_composer
        run: |
          # Only run composer if there are actual non-dev package dependencies.
          # Filter out php, ext-*, and bamarni (dev tool often in require by mistake).
          if [ -f composer.json ] && jq -e '
            .require // {} | to_entries
            | map(select(
              .key != "php"
              and (.key | startswith("ext-") | not)
              and (.key | startswith("bamarni/") | not)
            ))
            | length > 0
          ' composer.json > /dev/null 2>&1; then
            echo "found=true" >> "$GITHUB_OUTPUT"
          else
            echo "found=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up PHP
        if: steps.check_composer.outputs.found == 'true'
        uses: shivammathur/setup-php@7c071dfe9dc99bdf297fa79cb49ea005b9fcadbc # v2.37.1
        with:
          php-version: ${{ needs.init.outputs.php_version }}
          tools: composer

      - name: Run composer install
        if: steps.check_composer.outputs.found == 'true'
        # Default: --no-dev -a --quiet (with scripts, for apps like notifications
        # that vendor deps via post-install). Override per-app via composer_args in JSON.
        run: composer install ${{ matrix.composer_args != '' && matrix.composer_args || '--no-dev -a --quiet' }}

      - name: Remove .git
        run: rm -rf .git

      - name: Upload
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ${{ matrix.id }}
          path: .
          include-hidden-files: true
          retention-days: 1

  fetch-updater:
    needs: init
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          repository: nextcloud/updater
          ref: ${{ needs.init.outputs.ref }}
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: updater
          path: |
            index.php
            updater.phar
          retention-days: 1

  fetch-example-files:
    needs: init
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          repository: nextcloud/example-files
          ref: ${{ needs.init.outputs.ref }}
      - run: rm -rf .git
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: example-files
          path: .
          include-hidden-files: true
          retention-days: 1

  fetch-docs:
    needs: init
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - name: Checkout documentation (gh-pages)
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          repository: nextcloud/documentation
          ref: gh-pages

      - name: Extract docs for version
        run: |
          MAJOR="${{ needs.init.outputs.major }}"
          mkdir -p /tmp/docs/user_manual/en /tmp/docs/admin_manual

          for base in "server/${MAJOR}" "server/stable${MAJOR}" "${MAJOR}" "."; do
            if [ -d "${base}/user_manual/en" ]; then
              cp -a "${base}/user_manual/en/"* /tmp/docs/user_manual/en/
              break
            fi
          done

          for base in "server/${MAJOR}" "server/stable${MAJOR}" "${MAJOR}" "."; do
            if [ -d "${base}/admin_manual" ]; then
              cp -a "${base}/admin_manual/"* /tmp/docs/admin_manual/
              break
            fi
          done

          find . -name "Nextcloud_User_Manual.pdf" -exec cp -a {} /tmp/docs/ \; 2>/dev/null

      - name: Upload docs
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: docs
          path: /tmp/docs/
          retention-days: 1

  assemble:
    needs: [init, fetch-server, fetch-3rdparty, fetch-apps, fetch-updater, fetch-example-files, fetch-docs]
    if: >-
      always()
      && needs.fetch-server.result == 'success'
      && needs.fetch-3rdparty.result == 'success'
      && needs.fetch-apps.result == 'success'
      && needs.fetch-updater.result == 'success'
      && needs.fetch-example-files.result == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout config and scripts
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          path: _config

      - name: Download all artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1

      - name: Set up PHP
        uses: shivammathur/setup-php@7c071dfe9dc99bdf297fa79cb49ea005b9fcadbc # v2.37.1
        with:
          php-version: ${{ needs.init.outputs.php_version }}

      - name: Assemble release
        run: |
          # Rearrange artifacts into build dir structure expected by assemble.sh
          mkdir -p /tmp/build/apps
          mv server /tmp/build/server
          mv 3rdparty /tmp/build/3rdparty
          mv updater /tmp/build/updater
          mv example-files /tmp/build/example-files
          [ -d docs ] && mv docs /tmp/build/docs
          for app_dir in */; do
            id=$(basename "$app_dir")
            case "$id" in _config|release) continue ;; esac
            mv "$app_dir" "/tmp/build/apps/$id"
          done

          bash _config/.github/scripts/assemble.sh /tmp/build /tmp/nextcloud
          rm -rf /tmp/build

      - name: Clean dev files from all apps
        run: |
          # Run on ALL app dirs (matrix apps + core apps from server),
          # plus core/ and settings/ which also contain dev files.
          # Matrix apps may already be partially cleaned by .nextcloudignore
          # during fetch, but core apps from the server need this pass.
          SCRIPT="_config/.github/scripts/clean-dev-files.sh"
          shopt -s nullglob
          for dir in /tmp/nextcloud/apps/*/ /tmp/nextcloud/core/ /tmp/nextcloud/settings/; do
            [ -d "$dir" ] || continue
            bash "$SCRIPT" "$dir"
          done
          shopt -u nullglob

      - name: Update version.php
        run: |
          export NC=/tmp/nextcloud
          bash _config/.github/scripts/update-version-php.sh \
            /tmp/nextcloud "${{ needs.init.outputs.channel }}" "${{ needs.init.outputs.branch }}"

      - name: Sign release
        env:
          SIGN_KEY: ${{ secrets.SIGN_PRIVATE_KEY }}
          SIGN_CERT: ${{ secrets.SIGN_CERTIFICATE }}
        run: |
          if [ -z "$SIGN_KEY" ]; then
            echo "::warning::SIGN_PRIVATE_KEY not set, skipping code signing"
            exit 0
          fi
          echo "$SIGN_KEY" > /tmp/signing-key.pem
          CERT_ARG=""
          if [ -n "$SIGN_CERT" ]; then
            echo "$SIGN_CERT" > /tmp/signing-cert.pem
            CERT_ARG="/tmp/signing-cert.pem"
          fi
          bash _config/.github/scripts/sign-release.sh /tmp/nextcloud /tmp/signing-key.pem $CERT_ARG
          rm -f /tmp/signing-key.pem /tmp/signing-cert.pem

      - name: Generate metadata file
        if: needs.init.outputs.major >= 30
        run: |
          mkdir -p "$GITHUB_WORKSPACE/releases"
          bash _config/.github/scripts/generate-metadata.sh \
            /tmp/nextcloud "${{ needs.init.outputs.version }}" "$GITHUB_WORKSPACE/releases"

      - name: Package and checksum
        run: |
          bash _config/.github/scripts/package.sh \
            /tmp/nextcloud "${{ needs.init.outputs.version }}" "$GITHUB_WORKSPACE/releases"
          rm -rf _config

      - name: Sign archives for updater server
        env:
          SIGN_KEY: ${{ secrets.SIGN_PRIVATE_KEY }}
        run: |
          if [ -z "$SIGN_KEY" ]; then
            echo "::warning::SIGN_PRIVATE_KEY not set, skipping archive signing"
            exit 0
          fi
          echo "$SIGN_KEY" > /tmp/signing-key.pem
          VERSION="${{ needs.init.outputs.version }}"
          for ext in tar.bz2 zip; do
            archive="$GITHUB_WORKSPACE/releases/nextcloud-${VERSION}.${ext}"
            [ -f "$archive" ] || continue
            sig=$(openssl dgst -sha512 -sign /tmp/signing-key.pem "$archive" | openssl base64 | tr -d '\n')
            echo "$sig" > "${archive}.sig"
            echo "::notice::Signed ${ext} archive (${#sig} chars)"
          done
          rm -f /tmp/signing-key.pem

      - name: Attach signatures to GitHub release
        if: always()
        env:
          GH_TOKEN: ${{ secrets.RELEASE_TOKEN || github.token }}
        run: |
          TAG="${{ needs.init.outputs.tag }}"
          VERSION="${{ needs.init.outputs.version }}"
          # Upload .sig files to the release (create release if needed)
          for sig in releases/nextcloud-${VERSION}.*.sig; do
            [ -f "$sig" ] || continue
            gh release upload "$TAG" "$sig" --clobber 2>/dev/null \
              || echo "::warning::Could not attach $(basename "$sig") to release $TAG"
          done

      - name: Upload build artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: release
          path: releases/

  compare:
    needs: [init, assemble]
    if: always() && needs.assemble.result == 'success'
    runs-on: ubuntu-latest

    steps:
      - name: Download workflow build
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: release
          path: /tmp/new-release

      - name: Download existing release archive
        # Try GitHub release assets first (attached by the release script),
        # then fall back to the public download server.
        id: download
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ needs.init.outputs.tag }}"
          VERSION="${{ needs.init.outputs.version }}"
          ARCHIVE="nextcloud-${VERSION}.tar.bz2"
          mkdir -p /tmp/existing-release

          # 1. Try the GitHub release on this repo
          if gh release download "$TAG" \
            --repo "${{ github.repository }}" \
            --pattern "$ARCHIVE" \
            --dir /tmp/existing-release 2>/dev/null; then
            echo "source=github-release" >> "$GITHUB_OUTPUT"
            echo "found=true" >> "$GITHUB_OUTPUT"
            echo "::notice::Downloaded $ARCHIVE from GitHub release $TAG"
          # 2. Fall back to the public download server
          elif curl -fsSL -o "/tmp/existing-release/$ARCHIVE" \
            "https://download.nextcloud.com/server/releases/$ARCHIVE" 2>/dev/null; then
            echo "source=download-server" >> "$GITHUB_OUTPUT"
            echo "found=true" >> "$GITHUB_OUTPUT"
            echo "::notice::Downloaded $ARCHIVE from download.nextcloud.com"
          else
            echo "::warning::No existing archive found (GitHub release or download server)"
            echo "found=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Compare file lists
        if: steps.download.outputs.found == 'true'
        run: |
          VERSION="${{ needs.init.outputs.version }}"

          mkdir -p /tmp/existing /tmp/new
          tar -xf "/tmp/existing-release/nextcloud-${VERSION}.tar.bz2" -C /tmp/existing
          cd /tmp/new && sudo tar -xf "/tmp/new-release/nextcloud-${VERSION}.tar.bz2" && cd /

          (cd /tmp/existing && find . -type f | sort) > /tmp/existing-files.txt
          (cd /tmp/new && find . -type f | sort) > /tmp/new-files.txt

          comm -23 /tmp/existing-files.txt /tmp/new-files.txt > /tmp/only-in-existing.txt
          comm -13 /tmp/existing-files.txt /tmp/new-files.txt > /tmp/only-in-new.txt

          EXISTING_COUNT=$(wc -l < /tmp/existing-files.txt)
          NEW_COUNT=$(wc -l < /tmp/new-files.txt)
          MISSING=$(wc -l < /tmp/only-in-existing.txt)
          EXTRA=$(wc -l < /tmp/only-in-new.txt)

          # Known acceptable diffs between workflow and release script:
          # - signature.json: different signing keys (test vs production)
          # - core/doc/, Manual.pdf: docs may differ based on gh-pages timing
          # - .chunk.(mjs|css): hash-based filenames change with any code diff
          # - *.config.*: workflow strips dev configs the release script kept
          # - l10n: translation files may update between builds
          # - *.map.license: workflow strips REUSE sourcemap sidecars; official release keeps them
          KNOWN_PATTERN='(signature\.json|core/doc/|Nextcloud Manual\.pdf|\.chunk\.(mjs|css)|\.config\.(js|ts|mjs|cjs)$|\.prettierignore|/l10n/[^/]*\.(js|json)$|\.map\.license$)'
          UNEXPECTED_MISSING=$(grep -v -E "$KNOWN_PATTERN" /tmp/only-in-existing.txt | wc -l)
          UNEXPECTED_EXTRA=$(grep -v -E "$KNOWN_PATTERN" /tmp/only-in-new.txt | wc -l)

          {
            SOURCE="${{ steps.download.outputs.source }}"
            echo "## Build Comparison: ${{ needs.init.outputs.tag }}"
            echo ""
            echo "Reference archive from: **${SOURCE}**"
            echo ""
            echo "| | Files |"
            echo "|---|---|"
            echo "| Existing release | ${EXISTING_COUNT} |"
            echo "| Workflow build | ${NEW_COUNT} |"
            echo "| Only in release script | ${MISSING} (${UNEXPECTED_MISSING} unexpected) |"
            echo "| Only in workflow | ${EXTRA} (${UNEXPECTED_EXTRA} unexpected) |"
            echo ""

            if [ "$UNEXPECTED_MISSING" -eq 0 ] && [ "$UNEXPECTED_EXTRA" -eq 0 ]; then
              echo "### All differences are expected"
            fi

            if [ "$UNEXPECTED_MISSING" -gt 0 ]; then
              echo "### Unexpected files only in release script (${UNEXPECTED_MISSING})"
              echo '<details><summary>Show</summary>'
              echo ""
              echo '```'
              grep -v -E "$KNOWN_PATTERN" /tmp/only-in-existing.txt
              echo '```'
              echo '</details>'
              echo ""
            fi

            if [ "$UNEXPECTED_EXTRA" -gt 0 ]; then
              echo "### Unexpected files only in workflow (${UNEXPECTED_EXTRA})"
              echo '<details><summary>Show</summary>'
              echo ""
              echo '```'
              grep -v -E "$KNOWN_PATTERN" /tmp/only-in-new.txt
              echo '```'
              echo '</details>'
            fi
          } >> "$GITHUB_STEP_SUMMARY"

          echo "=== Only in release script build ==="
          grep -v -E "$KNOWN_PATTERN" /tmp/only-in-existing.txt || echo "(none)"
          echo "=== Only in workflow build ==="
          grep -v -E "$KNOWN_PATTERN" /tmp/only-in-new.txt || echo "(none)"

          if [ "$UNEXPECTED_MISSING" -gt 0 ] || [ "$UNEXPECTED_EXTRA" -gt 0 ]; then
            echo "::warning::Differences found between release script and workflow build"
          fi

          # Content comparison: hash common files to detect content diffs
          comm -12 /tmp/existing-files.txt /tmp/new-files.txt > /tmp/common-files.txt
          COMMON=$(wc -l < /tmp/common-files.txt)

          # Hash all common files in both trees
          (cd /tmp/existing && xargs -a /tmp/common-files.txt -d '\n' sha256sum 2>/dev/null | sort) > /tmp/existing-hashes.txt
          (cd /tmp/new && xargs -a /tmp/common-files.txt -d '\n' sha256sum 2>/dev/null | sort) > /tmp/new-hashes.txt

          # Find files with different content
          diff /tmp/existing-hashes.txt /tmp/new-hashes.txt > /tmp/hash-diff.txt 2>/dev/null || true
          CONTENT_DIFFS=$(grep "^[<>]" /tmp/hash-diff.txt | sed 's/^[<>] [a-f0-9]* \+//' | sort -u | wc -l)

          {
            echo ""
            echo "### Content comparison"
            echo ""
            echo "| | Count |"
            echo "|---|---|"
            echo "| Common files | ${COMMON} |"
            echo "| Content differs | ${CONTENT_DIFFS} |"

            if [ "$CONTENT_DIFFS" -gt 0 ]; then
              # Filter out version.php (expected: different build timestamp)
              KNOWN_CONTENT='(version\.php)'
              UNEXPECTED_CONTENT=$(grep "^[<>]" /tmp/hash-diff.txt | sed 's/^[<>] [a-f0-9]* \+//' | sort -u | grep -v -E "$KNOWN_CONTENT" | wc -l)
              echo "| Unexpected content diffs | ${UNEXPECTED_CONTENT} |"
              echo ""
              if [ "$UNEXPECTED_CONTENT" -gt 0 ]; then
                echo "<details><summary>Files with different content (${UNEXPECTED_CONTENT})</summary>"
                echo ""
                echo '```'
                grep "^[<>]" /tmp/hash-diff.txt | sed 's/^[<>] [a-f0-9]* \+//' | sort -u | grep -v -E "$KNOWN_CONTENT"
                echo '```'
                echo "</details>"
              else
                echo "Only version.php differs (expected: different build timestamp)"
              fi
            else
              echo ""
              echo "All common files are identical"
            fi
          } >> "$GITHUB_STEP_SUMMARY"

          echo "=== Content diffs (excluding version.php) ==="
          if [ "$CONTENT_DIFFS" -gt 0 ]; then
            grep "^[<>]" /tmp/hash-diff.txt | sed 's/^[<>] [a-f0-9]* \+//' | sort -u | grep -v -E "$KNOWN_CONTENT" || echo "(none)"
          else
            echo "(none)"
          fi
